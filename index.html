<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingeniería de Software - Equipo Akiton</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1 id="team-title">Equipo: Akiton</h1>

  <h2 class="member-name" id="member-2-name">Akira Jaqueline Joya Hernandez</h2>

  <!-- Sección de integrantes con tarjetas -->

    <!-- Tarjeta de miembro 1 -->
    <div class="member-card">
      <img id="member-1-photo" src="./fotos/FotoAntonio.png" alt="Foto de integrante 1">
      <p id="member-1-desc"></p>
    </div>
    <!-- Tarjeta de miembro 2 -->
    <div class="member-card">
      <img id="member-2-photo" src="./fotos/FotoAkira.jpeg" alt="Foto de integrante 2">
      <p id="member-2-desc"></p>
    </div>
  </div>
  <div class="buttons-container">
    <button id="colorButton">Cambiar color de fondo</button>
    <button id="switchButton">Mostrar siguiente equipo</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
